<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="color-scheme" content="light dark">
    <title>TrackStudio</title>
    <!-- L9: Removed Google Fonts CDN for GDPR and offline support. Inter font will use system fallback -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon"/>
    <link rel="icon" href="favicon.png" type="image/png"/>
    <link rel="stylesheet" href="style_tokens.css"/>
    <link rel="stylesheet" href="style_shell.css"/>
</head>
<body>
    <div class="ts-shell" id="tsShell">
        <aside class="ts-sidebar" id="tsSidebar" role="complementary"
               aria-label="Navigation sidebar">
            <iframe id="tsSidebarFrame" src="TreeLoaderAction.do?method=init"
                    class="ts-sidebar__frame" title="Navigation sidebar"></iframe>
        </aside>
        <div class="ts-sidebar-toggle" id="tsSidebarToggle" title="Toggle sidebar"
             role="button" tabindex="0" aria-label="Toggle navigation sidebar"
             aria-expanded="true" aria-controls="tsSidebar">
            <span class="ts-sidebar-toggle__icon" aria-hidden="true">&#x276E;</span>
        </div>
        <main class="ts-main" id="tsMain" role="main">
            <iframe id="tsContent" name="mainFrame" src="TaskAction.do"
                    class="ts-main__frame" title="Main content"></iframe>
        </main>
    </div>

    <!-- Phase 9: Sidebar backdrop for tablet/mobile overlay -->
    <div class="ts-sidebar-backdrop" id="tsSidebarBackdrop" aria-hidden="true"></div>

    <!-- Phase 10: Toast notification container -->
    <div class="ts-toast-container" id="tsToastContainer" aria-live="polite" aria-atomic="false"></div>

    <script src="app-shell.js"></script>
    <script src="html/ts-toast.js"></script>
</body>
</html>
